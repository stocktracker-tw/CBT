<body>
<title>Mindrise 心晴 · CBT 自助練習</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root{
  color-scheme:dark;
  --bg:#0D0812;
  --ambient:
    radial-gradient(46% 40% at 12% 4%, rgba(255,140,60,.26), transparent 70%),
    radial-gradient(42% 36% at 88% 8%, rgba(220,80,140,.18), transparent 70%),
    radial-gradient(52% 46% at 84% 90%, rgba(150,90,220,.26), transparent 70%),
    radial-gradient(36% 30% at 6% 92%, rgba(120,70,200,.20), transparent 72%),
    linear-gradient(180deg,#140B18,#0A0610);
  --drift:rgba(200,120,220,.12);
  --ink:#F8F2EC; --ink2:#C7B7C2; --muted:#9C8D9A;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --accent:#FF9A4D; --accent-hi:#FFB070; --accent-ink:#331A05;
  --wash:rgba(255,154,77,.15);
  --violet:#B79DF5; --violet-wash:rgba(183,157,245,.16);
  --s-mood:#FF9A4D; --s-sleep:#B79DF5;
  --danger:#F0716B; --danger-wash:rgba(240,113,107,.12);
  --good:#FF9A4D;
  --glass:rgba(255,220,205,.065);
  --glass-strong:rgba(24,16,26,.75);
  --glass-brd:rgba(255,255,255,.12);
  --card:rgba(255,220,205,.075);
  --card2:rgba(255,220,205,.05);
  --orb-hi:rgba(255,255,255,.20);
  --lens:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.05)),linear-gradient(rgba(58,45,66,.92),rgba(58,45,66,.92));
  --shadow:0 18px 48px -18px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(255,255,255,.03);
  --radius:24px;
  --grid-line:rgba(255,255,255,.06); --axis:rgba(255,255,255,.18);
  --tip-bg:rgba(248,242,238,.94); --tip-ink:#160E1A;
}
@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))){
  :root{ --glass:rgba(22,14,26,.95); --glass-strong:rgba(18,12,22,.97); --card:rgba(36,26,40,.92) }
}
html{background:var(--bg)}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:15px; line-height:1.7; -webkit-font-smoothing:antialiased;
}
body::before{content:""; position:fixed; inset:0; z-index:-2; background:var(--ambient)}
body::after{content:""; position:fixed; inset:-24%; z-index:-1; pointer-events:none;
  background:radial-gradient(32% 30% at 58% 42%, var(--drift), transparent 70%);
  filter:blur(30px); animation:drift 48s ease-in-out infinite alternate}
@keyframes drift{from{transform:translate3d(-4%,-2%,0) scale(1)} to{transform:translate3d(4%,3%,0) scale(1.1)}}
*{box-sizing:border-box}
#app{max-width:640px; margin:0 auto; padding:calc(80px + env(safe-area-inset-top,0px)) 16px calc(110px + env(safe-area-inset-bottom,0px));}
button{font-family:inherit; cursor:pointer}
textarea,input,select{font-family:inherit; font-size:15px; color:var(--ink)}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}
::placeholder{color:var(--muted)}

/* ---------- header (fixed, Stocks-style) ---------- */
.top{position:fixed; top:0; left:0; right:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top,0px)) max(16px, calc((100vw - 608px) / 2)) 10px;
  background:transparent;
  transition:background .25s ease, box-shadow .25s ease}
.top.scrolled{background:var(--glass-strong);
  backdrop-filter:blur(60px) saturate(1.7); -webkit-backdrop-filter:blur(60px) saturate(1.7);
  box-shadow:0 1px 0 var(--glass-brd), 0 14px 34px -22px rgba(0,0,0,.55)}
.brand-row{display:flex; align-items:center; gap:10px; min-width:0}
.logo{width:38px; height:38px; border-radius:11px; display:block; flex:0 0 auto;
  box-shadow:0 4px 14px -6px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.14)}
.brand{font-size:20px; font-weight:700; letter-spacing:.06em}
.brand small{display:block; font-size:11px; font-weight:500; color:var(--ink2); letter-spacing:.18em; margin-top:1px}
.streak-chip{display:flex; align-items:center; gap:6px; background:var(--glass);
  backdrop-filter:blur(18px) saturate(1.6); -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1px solid var(--glass-brd); box-shadow:inset 0 1px 0 var(--orb-hi);

.streak-chip .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent)}

/* ---------- glass cards ---------- */
.card{background:var(--glass); border:1px solid var(--glass-brd); border-radius:var(--radius);
  backdrop-filter:blur(48px) saturate(1.7); -webkit-backdrop-filter:blur(48px) saturate(1.7);
  box-shadow:var(--shadow); padding:18px 18px 16px; margin:14px 0}
.card.tight{padding:14px 16px}
.card h2{margin:0 0 4px; font-size:17px; font-weight:700; letter-spacing:.02em; text-wrap:balance}
.card h3{margin:0 0 2px; font-size:15px; font-weight:600}
.eyebrow{font-size:11.5px; font-weight:600; letter-spacing:.14em; color:var(--accent); margin:0 0 6px}
.sub{color:var(--ink2); font-size:13.5px; margin:0 0 10px}
.body-text{color:var(--ink); font-size:14.5px; white-space:pre-wrap}
.mut{color:var(--muted); font-size:12.5px}
.divider{border:0; border-top:1px solid var(--line); margin:14px 0}

/* ---------- buttons ---------- */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:1px solid rgba(255,255,255,.30); border-radius:999px; padding:11px 20px;
  font-size:14.5px; font-weight:600; letter-spacing:.04em;
  background:linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,0) 55%), var(--accent);
  color:var(--accent-ink); transition:filter .15s, transform .06s;
  box-shadow:0 8px 22px -10px color-mix(in srgb, var(--accent) 65%, transparent), inset 0 1px 0 rgba(255,255,255,.35)}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card2); color:var(--ink); border-color:var(--glass-brd);
  box-shadow:inset 0 1px 0 var(--orb-hi)}
.btn.ghost:hover{filter:none; background:var(--card)}
.btn.sm{padding:7px 15px; font-size:13px}
.btn.block{width:100%}
.btn[disabled]{opacity:.45; cursor:default}
.linklike{background:none; border:none; color:var(--accent); font-size:13.5px; font-weight:600; padding:4px 2px; text-decoration:underline; text-underline-offset:3px}

.chip{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--glass-brd); background:var(--card2);
  color:var(--ink2); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:500; transition:all .12s;
  box-shadow:inset 0 1px 0 var(--orb-hi)}
.chip:hover{border-color:var(--accent); color:var(--accent)}
.chip.on{background:var(--wash); border-color:color-mix(in srgb, var(--accent) 55%, transparent); color:var(--accent); font-weight:600;
  box-shadow:inset 0 1px 0 var(--orb-hi), 0 0 12px -4px color-mix(in srgb, var(--accent) 50%, transparent)}
.chip-row{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 4px}

/* ---------- floating glass tab bar ---------- */
.tabbar{position:fixed; left:50%; transform:translateX(-50%);
  bottom:calc(11px + env(safe-area-inset-bottom,0px)); z-index:40;
  width:min(324px, calc(100vw - 52px));
  background:var(--glass-strong);
  backdrop-filter:blur(60px) saturate(1.7); -webkit-backdrop-filter:blur(60px) saturate(1.7);
  border:1px solid var(--glass-brd); border-radius:999px;
  box-shadow:0 18px 44px -16px rgba(0,0,0,.45), inset 0 1px 0 var(--orb-hi);
  touch-action:none; user-select:none; -webkit-user-select:none}
.tabbar .inner{display:flex; padding:6px; position:relative}
.tab{flex:1 1 0; min-width:0; display:flex; flex-direction:column; align-items:center; gap:0;
  background:none; border:none; padding:15px 4px; border-radius:999px; color:var(--muted); font-size:0;
  overflow:hidden;
  transition:color .15s;
  position:relative; z-index:1}
.tab svg{width:26px; height:26px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round}
.tab.on{color:var(--accent); font-weight:700}
.tab.near{color:var(--accent)}
.tab:hover{color:var(--ink2)}
.tab.on:hover{color:var(--accent)}
.lens{position:absolute; top:6px; bottom:6px; left:6px; width:0; border-radius:999px; z-index:0;
  background:var(--lens); pointer-events:none;
  box-shadow:inset 0 1px 0 var(--orb-hi), 0 4px 14px -6px rgba(0,0,0,.35);
  transition:left .38s cubic-bezier(.2,1.4,.3,1), width .3s ease, transform .22s ease, opacity .2s ease;
  will-change:left,transform}
.lens.drag{transition:transform .12s ease}
@media (prefers-reduced-motion: reduce){
  .lens{transition:none}
}

/* ---------- sliders ---------- */
.slider-row{margin:12px 0 2px}
.slider-row .lab{display:flex; justify-content:space-between; align-items:baseline; font-size:13.5px; color:var(--ink2); font-weight:600}
.slider-row .val{font-size:22px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums;
  text-shadow:0 0 14px color-mix(in srgb, var(--accent) 45%, transparent)}
.slider-row .ends{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-top:2px}
input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:26px; background:transparent; margin:6px 0 0}
input[type=range]::-webkit-slider-runnable-track{height:6px; border-radius:3px; background:var(--line2); box-shadow:inset 0 1px 2px rgba(0,0,0,.12)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%;
  background:linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0) 60%), var(--accent);
  border:1px solid rgba(255,255,255,.45); box-shadow:0 2px 10px color-mix(in srgb, var(--accent) 50%, transparent); margin-top:-8px}
input[type=range]::-moz-range-track{height:6px; border-radius:3px; background:var(--line2)}
input[type=range]::-moz-range-thumb{width:18px; height:18px; border-radius:50%; background:var(--accent); border:1px solid rgba(255,255,255,.45); box-shadow:0 2px 10px color-mix(in srgb, var(--accent) 50%, transparent)}

/* ---------- forms ---------- */
.field{margin:12px 0}
.field label{display:block; font-size:13px; font-weight:600; color:var(--ink2); margin-bottom:5px; letter-spacing:.04em}
.field textarea,.field input[type=text]{width:100%; border:1px solid var(--glass-brd); border-radius:14px;
  background:var(--card); padding:10px 13px; line-height:1.6; resize:vertical;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06)}
.field textarea{min-height:64px}
.field textarea:focus,.field input:focus{border-color:var(--accent); outline:none; box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent)}

/* ---------- stepper ---------- */
.stepper-dots{display:flex; gap:6px; margin:2px 0 14px}
.stepper-dots i{height:4px; flex:1; border-radius:2px; background:var(--line2)}

.step-nav{display:flex; gap:10px; margin-top:16px}

/* ---------- lesson / list ---------- */
.lesson-card{border-left:none; position:relative; overflow:hidden}
.lesson-card::before{content:""; position:absolute; left:0; top:14px; bottom:14px; width:4px; border-radius:0 4px 4px 0;
  background:linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 30%, transparent))}
.item-row{display:flex; align-items:flex-start; gap:10px; padding:11px 2px; border-bottom:1px solid var(--line)}
.item-row:last-child{border-bottom:none}
.item-row .grow{flex:1; min-width:0}
.item-row .t{font-weight:600; font-size:14px}
.item-row .d{font-size:12.5px; color:var(--muted)}
.item-row.done .t{text-decoration:line-through; color:var(--muted)}
.badge{font-size:11px; font-weight:700; letter-spacing:.08em; border-radius:999px; padding:2px 9px; white-space:nowrap; font-variant-numeric:tabular-nums}
.badge.g{background:var(--wash); color:var(--accent)}
.badge.v{background:var(--violet-wash); color:var(--violet)}
.badge.r{background:var(--danger-wash); color:var(--danger)}
.check-btn{width:26px; height:26px; min-width:26px; border-radius:50%; border:2px solid var(--line2); background:var(--card2); padding:0; margin-top:2px; position:relative}
.check-btn::before{content:""; position:absolute; inset:-9px}
.item-row .linklike{position:relative}
.item-row .linklike::before{content:""; position:absolute; inset:-9px}
.check-btn.on{background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px -2px color-mix(in srgb, var(--accent) 70%, transparent)}
.check-btn.on::after{content:""; position:absolute; inset:0; background:center/14px no-repeat url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>')}

/* ---------- accordion ---------- */
details.acc{border:1px solid var(--glass-brd); border-radius:20px; margin:10px 0; background:var(--glass);
  backdrop-filter:blur(48px) saturate(1.7); -webkit-backdrop-filter:blur(48px) saturate(1.7);
  box-shadow:var(--shadow); overflow:hidden}
details.acc summary{list-style:none; cursor:pointer; padding:14px 16px; font-weight:700; font-size:15px; display:flex; align-items:center; gap:10px}
details.acc summary::-webkit-details-marker{display:none}
details.acc summary .arrow{margin-left:auto; transition:transform .18s; color:var(--muted)}
details.acc[open] summary .arrow{transform:rotate(90deg)}
details.acc .acc-body{padding:0 16px 14px}
.acc-tag{font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--accent); background:var(--wash); border-radius:999px; padding:2px 9px}

/* ---------- breathing ---------- */
.breath-stage{display:flex; flex-direction:column; align-items:center; padding:22px 0 8px}
.breath-orb{width:190px; height:190px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 32% 28%, var(--orb-hi), transparent 46%),
    radial-gradient(circle at 68% 76%, color-mix(in srgb, var(--violet) 18%, transparent), transparent 60%),
    color-mix(in srgb, var(--accent) 20%, transparent);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid color-mix(in srgb, var(--accent) 40%, var(--glass-brd));
  box-shadow:inset 0 1px 0 var(--orb-hi), 0 22px 54px -20px color-mix(in srgb, var(--accent) 60%, transparent);
  transition:transform 1s linear; transform:scale(.72)}
.breath-orb .ph{font-size:19px; font-weight:700; letter-spacing:.14em; color:var(--ink)}
.breath-count{font-size:13px; color:var(--ink2); margin-top:14px; font-variant-numeric:tabular-nums; letter-spacing:.06em}
@media (prefers-reduced-motion: reduce){
  .breath-orb{transition:none}
  body::after{animation:none}
  *{animation:none !important}
}

/* ---------- timer ---------- */
.timer-big{font-size:46px; font-weight:700; text-align:center; font-variant-numeric:tabular-nums; letter-spacing:.04em; margin:8px 0 2px;
  text-shadow:0 0 22px color-mix(in srgb, var(--accent) 35%, transparent)}

/* ---------- chart ---------- */
.viz-card{padding:16px 14px 12px}
.viz-head{display:flex; align-items:baseline; justify-content:space-between; padding:0 4px; gap:8px; flex-wrap:wrap}
.legend{display:flex; gap:14px; font-size:12.5px; color:var(--ink2)}
.legend .key{display:inline-flex; align-items:center; gap:6px}
.legend .swatch{width:10px; height:10px; border-radius:3px}
.ticker-row{display:flex; gap:14px; padding:6px 4px 2px; font-size:13px; color:var(--ink2); font-variant-numeric:tabular-nums; flex-wrap:wrap}
.ticker-row b{font-size:17px; color:var(--ink)}
.delta{font-weight:700; font-size:12px; border-radius:999px; padding:1px 8px}
.delta.up{color:var(--accent); background:var(--wash)}
.delta.down{color:var(--muted); background:var(--card2)}
.delta.flat{color:var(--muted); background:var(--card2)}
.viz-wrap{position:relative; margin-top:6px}
.viz-wrap svg{display:block; width:100%; height:auto}
.viz-tip{position:absolute; pointer-events:none; background:var(--tip-bg); color:var(--tip-ink);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border:1px solid var(--glass-brd);
  border-radius:10px; padding:7px 10px; font-size:12px; line-height:1.5; white-space:nowrap;
  transform:translate(-50%,-108%); opacity:0; transition:opacity .1s; font-variant-numeric:tabular-nums; z-index:5}
.viz-tip b{font-weight:700}
.data-table{width:100%; border-collapse:collapse; font-size:13px; font-variant-numeric:tabular-nums}
.data-table th{text-align:left; color:var(--muted); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line2); letter-spacing:.06em}
.data-table td{padding:6px 8px; border-bottom:1px solid var(--line); color:var(--ink2)}

/* ---------- modal ---------- */
.modal-veil{position:fixed; inset:0; background:rgba(4,8,7,.42); z-index:60; display:flex; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(10px) saturate(1.2); -webkit-backdrop-filter:blur(10px) saturate(1.2)}

.modal-box{background:var(--glass-strong); width:100%; max-width:560px; max-height:86vh; overflow-y:auto;
  backdrop-filter:blur(60px) saturate(1.7); -webkit-backdrop-filter:blur(60px) saturate(1.7);
  border-radius:28px 28px 0 0; padding:20px 20px 24px; border:1px solid var(--glass-brd);
  box-shadow:0 -14px 50px -20px rgba(0,0,0,.5), inset 0 1px 0 var(--orb-hi)}
@media(min-width:560px){.modal-box{border-radius:28px}}
.modal-box h2{margin-top:0}
.modal-close{float:right; background:var(--card2); border:1px solid var(--glass-brd); border-radius:50%; width:32px; height:32px; font-size:15px; color:var(--ink2); line-height:1}

/* ---------- toast ---------- */
#toast{position:fixed; left:50%; bottom:calc(118px + env(safe-area-inset-bottom,0px)); transform:translateX(-50%) translateY(12px);
  background:var(--tip-bg); color:var(--tip-ink); border:1px solid var(--glass-brd);

  opacity:0; pointer-events:none; transition:all .22s; z-index:80; max-width:86vw; text-align:center}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.view{display:none}
.view.on{display:block; animation:fadein .22s ease}

.page-sub{color:var(--ink2); font-size:13.5px; margin:2px 2px 4px}
.tool-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px}
.tool-tile{background:var(--glass); border:1px solid var(--glass-brd); border-radius:20px; box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(1.5); -webkit-backdrop-filter:blur(18px) saturate(1.5);
  padding:14px; text-align:left; display:flex; flex-direction:column; gap:6px; transition:border-color .15s, transform .1s; color:var(--ink)}
.tool-tile:hover{border-color:color-mix(in srgb, var(--accent) 50%, transparent); transform:translateY(-1px)}
.tool-tile .ic{width:34px; height:34px; border-radius:10px; background:var(--wash); display:flex; align-items:center; justify-content:center;
  box-shadow:inset 0 1px 0 var(--orb-hi)}

.tool-tile .tt{font-weight:700; font-size:14px}
.tool-tile .td{font-size:12px; color:var(--muted); line-height:1.5}
.tool-tile.night .ic{background:var(--violet-wash)}

.pill-scale{display:flex; gap:8px; margin:8px 0 2px}
.pill-scale button{flex:1; border:1px solid var(--glass-brd); background:var(--card2); border-radius:14px; padding:9px 4px; font-size:12.5px; color:var(--ink2); line-height:1.35}
.pill-scale button.on{border-color:color-mix(in srgb, var(--accent) 55%, transparent); background:var(--wash); color:var(--accent); font-weight:700;
  box-shadow:0 0 12px -4px color-mix(in srgb, var(--accent) 50%, transparent)}
.notice{background:var(--card2); border:1px dashed var(--line2); border-radius:16px; padding:12px 14px; font-size:13px; color:var(--ink2); margin:12px 0}

const CONTENT = {"anxiety":{"lessons":[{"title":"想法如何影響感受","body":"同一件事，不同的想法會帶來完全不同的感受。想像朋友已讀不回：如果你想「他是不是討厭我了」，你可能感到焦慮，忍不住一直滑手機；如果你想「他大概在忙」，你會比較平靜，繼續做自己的事。事件本身沒變，改變的是你對它的解讀。這就是認知行為治療（CBT）的核心：想法、情緒、行為三者互相影響，形成一個循環。好消息是，這個循環有入口——你無法控制發生什麼事，但你可以學著覺察並調整自己的想法與行動，感受就會跟著鬆動。這不是要你硬逼自己「正向思考」，而是練習看見更貼近現實的可能性。","practice":"回想今天一個讓你有情緒的時刻，在紙上或手機備忘錄寫三個欄位：事件、想法、情緒。各寫一行就好，例如：「主管說明天談一下／我是不是做錯什麼／焦慮7分」。只要寫下來，不用分析。"},{"title":"抓住自動化思考","body":"你有沒有發現，有些念頭幾乎是「自己蹦出來的」？CBT 稱它們為自動化思考：速度快、不請自來，而且感覺起來像事實。壓力大的時候，它們往往偏向負面：「我一定搞砸了」「大家都覺得我不行」。問題不在於有這些念頭——每個人都有——而在於我們常常沒發現它們，就直接照單全收。練習的第一步不是反駁，而是抓住它：當你注意到心情突然往下掉或緊繃起來，停一下，問自己「剛剛腦中閃過什麼？」。能看見念頭，你和念頭之間就多了一點距離，而這個距離，就是所有改變的起點。","practice":"在手機設定一個今天的提醒。提醒響起時，停下來30秒，問自己：「我現在感覺如何？剛剛腦中閃過什麼念頭？」把那個念頭原封不動記進備忘錄，一句話就好。"},{"title":"認出災難化思考","body":"焦慮常常來自一種特定的思考習慣：災難化——從一個小訊號直接跳到最糟的結局。胸口悶一下，就想到重病；主管一句「來談談」，就想到被資遣。它的常見特徵是：「萬一…怎麼辦」的連鎖句、「一定會」「完蛋了」這類絕對化字眼，以及把「可能發生」當成「必然發生」。災難化其實是大腦在保護你——寧可誤報一百次，也不想漏掉一次危險。但它高估了威脅，也低估了你的應對能力。這一課只要做一件事：認出它。當你能對自己說「啊，我又在災難化了」，它對你的影響力就開始下降。","practice":"今天留意一次「萬一…」開頭的念頭。抓到時，在心裡替它貼上標籤：「這是災難化思考」，然後把那句「萬一」寫進備忘錄。不用反駁它，認出來就算完成練習。"},{"title":"三個問題鬆開擔憂","body":"認出災難化思考之後，下一步是用提問鬆開它。試試這三個問題：一、最壞的情況是什麼？具體想清楚，而不是停在模糊的恐懼裡。二、最好的情況是什麼？逼自己往另一端想一次。三、最可能的情況是什麼？根據你過去的實際經驗來判斷。多數人會發現，「最可能」離「最壞」很遠。最後再加一問：如果最壞真的發生，我能怎麼應對？當你發現自己其實有辦法面對，恐懼就會縮小。這不是自我安慰，而是把大腦從「單一結局」拉回「多種可能」的現實。把答案寫下來，會比只在腦中想有效得多。","practice":"挑一個此刻正在困擾你的擔憂，花5分鐘寫下四個答案：最壞會怎樣？最好會怎樣？最可能會怎樣？如果最壞發生，我的第一步應對是什麼？寫完後，重新為擔心程度打分（0到10）。"},{"title":"給擔憂一個時段","body":"擔憂最消耗人的地方，是它整天隨時插隊：工作時想、吃飯時想、躺在床上還在想。「擔憂時間」是一個有研究支持的方法：每天安排一段固定的15分鐘，專門用來擔憂。時段外冒出來的擔憂，不用趕走它，只要記下一句話，告訴自己「留到擔憂時間再想」，然後回到手邊的事。聽起來簡單，效果卻很實在：你會發現很多擔憂到了時段時已經不重要了，而大腦也慢慢學會——擔憂可以等，不必當下處理。重點是時段要固定，而且避開睡前，才不會把擔憂帶上床，影響睡眠。","practice":"現在就決定你的擔憂時間：選一個每天固定、離睡前至少兩小時的15分鐘（例如晚上七點），設好手機提醒，並建立一則名為「擔憂清單」的備忘錄。今天冒出擔憂時，寫一句話進去，其他的留到時段再說。"},{"title":"可控與不可控","body":"不是所有擔憂都該用同一種方式對待。試著把擔憂分成兩類：可控的——你能採取行動影響結果，例如「報告還沒準備好」；不可控的——結果不在你手上，例如「明天會不會下雨」「別人怎麼看我」。分類之後，策略就清楚了：可控的擔憂，把它轉成一個具體的下一步行動，愈小愈好；不可控的擔憂，練習承認「這不在我手上」，然後把注意力帶回眼前你能做的事。焦慮常常來自用「反覆想」去處理「不可控」——那就像轉一個沒有接線的方向盤，愈用力愈累。分清楚，力氣才會用在對的地方。","practice":"從你的擔憂清單挑三個，在每一個旁邊標上「可控」或「不可控」。選一個可控的，寫下一個5分鐘內能完成的行動（例如：回一封信、查一筆資料），現在就去做。"},{"title":"用呼吸穩住身體","body":"焦慮不只發生在腦中，也發生在身體：心跳加快、肩膀緊繃、呼吸變淺。好消息是，這條路是雙向的——你可以透過身體來安撫大腦。腹式呼吸是最直接的工具：緩慢的深呼吸，特別是拉長吐氣，會啟動副交感神經系統，向身體發出「現在安全」的訊號。做法很簡單：一手放在腹部，用鼻子吸氣默數4拍，感覺腹部鼓起；再緩緩吐氣默數6拍，感覺腹部下沉。關鍵是平常就練，讓它變成熟悉的技能，緊張時才拿得出來——就像消防演習，不會等失火了才第一次演練。","practice":"現在就練習3分鐘：坐好，雙腳踩地，一手放腹部。鼻子吸氣4拍、嘴巴吐氣6拍，重複約15次。分心很正常，發現了就輕輕把注意力帶回呼吸。結束後觀察一下，身體哪裡鬆了一點。"}],"exercises":[{"name":"去災難化提問","intro":"當你發現自己陷入「萬一…」的災難化想像時使用，透過一連串提問把注意力從最壞的想像拉回現實的機率。","steps":["用一句話寫下你正在擔心的事（例如：「明天的報告會出錯」）。","問自己：最壞的情況是什麼？具體寫下來，不要停在模糊的恐懼裡。","問自己：最好的情況是什麼？也寫下來，逼自己往另一端想一次。","問自己：最可能的情況是什麼？根據過去的實際經驗判斷，寫下來。","問自己：如果最壞真的發生，我可以怎麼應對？寫下一到兩個做法。","重讀你寫的內容，為此刻的擔心程度重新打分（0到10），和一開始比較看看。"]},{"name":"擔憂時間","intro":"當擔憂整天纏著你、打斷工作與睡眠時使用；把擔憂集中到固定時段，能訓練大腦「現在不用處理」。","steps":["選一個每天固定的15分鐘作為「擔憂時間」，避開睡前兩小時（例如晚上七點），並設好手機提醒。","準備一份「擔憂清單」，手機備忘錄或隨身紙本都可以。","白天擔憂冒出來時，用一句話記到清單上，告訴自己「留到擔憂時間再想」，然後回到手邊的事。","到了擔憂時間，設定15分鐘計時器，逐條檢視清單：還在意的，想一想或寫下一個可行動的下一步；已經不在意的，直接劃掉。","時間一到就停止，收起清單，起身去做別的事。明天同一時間再繼續。"]},{"name":"4-6呼吸法","intro":"當焦慮升高、心跳加快或需要快速穩定下來時使用；拉長吐氣能啟動身體的放鬆反應，平常多練效果更好。","steps":["找個地方坐下，雙腳踩地，一手輕放在腹部。","用鼻子吸氣，默數4拍，感覺腹部像氣球一樣慢慢鼓起。","用嘴巴緩緩吐氣，默數6拍，感覺腹部慢慢下沉。","重複10到15次，大約2到3分鐘；分心了就輕輕把注意力帶回呼吸，不用責怪自己。","結束時觀察身體的變化就好，不用強求「一定要放鬆」。"]}],"quick_tips":["擔憂冒出來時，先問自己：這是想法，還是事實？","寫下來的擔憂，會比在腦中盤旋時小得多。","焦慮升高時，讓吐氣比吸氣長，身體會先慢下來。","「萬一…」開頭的句子，多半是災難化思考的訊號。","擔憂可以延後：先記下來，留到擔憂時間再處理。","遇到不可控的事，把注意力拉回下一步能做的小事。","焦慮是大腦在保護你，只是它的警報常常太靈敏。"]},"mood":{"lessons":[{"title":"行動先於動力","body":"心情低落時，我們常想：「等我有動力了再去做。」但研究發現順序其實相反——是行動帶來動力，而不是等動力來了才行動。這就是行為活化的核心：先做一點點，感覺會跟著改變。低落的心情讓人想退縮、少做事，但活動越少，生活就越缺乏正向回饋，心情又更往下掉，形成惡性循環。行為活化要做的，就是輕輕打破這個循環：不等心情好轉，先安排一個小小的行動。你不需要「覺得想做」才去做，你只需要開始。做完之後，再觀察心情有沒有一點點不同——通常會有。","practice":"現在挑一件兩分鐘內能完成的小事（倒杯水、打開窗、整理桌面一角），立刻去做。做之前和做完後，各用0到10分記下你的心情分數，比較看看。"},{"title":"愉悅與成就，兩種養分","body":"行為活化把活動分成兩類：愉悅活動讓你感到享受或放鬆，例如聽喜歡的歌、泡杯茶、散步曬太陽；成就活動讓你感到「我完成了什麼」，例如洗好一批衣服、回覆一封拖著的訊息。心情低落時，這兩種養分往往同時缺乏——日子只剩下「必須做」和「撐過去」。安排活動時，兩種都要有：只有愉悅沒有成就，容易空虛；只有成就沒有愉悅，容易耗竭。活動不必大，重點是「刻意安排」而不是「看心情」。寫進行事曆、有具體時間的小活動，比腦中模糊的「有空再說」更可能真的發生。","practice":"拿出手機或紙筆，各寫下三個10分鐘內能完成的愉悅活動和成就活動。從中挑一個，寫進明天的行事曆，並指定具體的時間和地點。"},{"title":"小心「貼標籤」","body":"心情低落時，腦中常出現對自己的整體判決：「我很沒用」「我就是個失敗者」。這種思考方式在CBT裡叫「貼標籤」——用一個負面標籤概括整個人，而不是描述具體事件。注意兩者的差別：「我這次報告遲交了」是事實描述；「我是個不可靠的人」是標籤。標籤的問題在於它抹去了所有例外和細節，也讓人覺得無從改變——一件事可以處理，但「整個人很糟」要從哪裡改起？下次發現自己在下判決時，退一步問：我剛剛是在描述一件事，還是在給自己貼標籤？光是分辨出來，標籤的重量就會減輕。","practice":"回想最近一次責備自己的時刻，寫下當時腦中的句子。如果那是一個標籤（例如「我真沒用」），把它改寫成具體事件的描述（例如「我今天沒回那封信」）。"},{"title":"過度類化與心理過濾","body":"除了貼標籤，還有兩種思考偏誤常伴隨低落心情。「過度類化」是從單一事件推出全面結論：一次面試不順，就變成「我永遠找不到工作」。它的線索是「總是」「永遠」「每次」「沒有人」這類字眼。「心理過濾」則像戴了一副只看得見負面的眼鏡：十件事有九件順利，你只記得出錯的那一件，其他九件彷彿不存在。這兩種偏誤不代表你笨或悲觀，它們是低落心情下大腦的自動反應。你的任務不是責備自己「又想歪了」，而是練習抓到它：喔，這是過度類化；喔，我又在過濾了。能夠命名它，就是鬆動它的第一步。","practice":"今天留意自己的內在語言，抓到一次出現「總是、永遠、每次」或「只記得壞的那件」的時刻，在手機備忘錄記下那句話，並標註它屬於哪一種偏誤。"},{"title":"改寫成平衡思考","body":"認出偏誤之後，下一步是改寫。先說清楚：平衡思考不是強迫正向，不是把「我很糟」硬換成「我很棒」——那種話你自己也不會信。平衡思考是把被忽略的證據找回來，寫出一句更完整、也更公平的話。做法是問三個問題：一、支持這個想法的證據是什麼？二、不支持它的證據是什麼？包括例外、別人的回饋、你過去做到的事。三、綜合兩邊，比較貼近事實的說法是什麼？例如「我把事情搞砸了，我什麼都做不好」可以改寫成「這件事出了錯，我需要修正，但這週我也完成了其他幾件事」。平衡的句子未必讓你立刻開心，但會讓你比較有力氣行動。","practice":"挑一個最近反覆出現的負面想法，花五分鐘寫下：支持它的證據、不支持它的證據，然後寫出一句把兩邊都納入的平衡句，並唸出來聽聽看。"},{"title":"像對待好朋友一樣","body":"想像你最好的朋友搞砸了一件事，難過地打電話給你。你會對他說「你就是這麼沒用」嗎？不會。你大概會說：「這真的很難受，但這不代表你整個人不行。」奇怪的是，我們對自己卻常用最苛刻的那套語言。自我慈悲不是放縱、也不是找藉口——研究反而顯示，對自己溫和的人更願意承認錯誤、也更快重新行動，因為他們不必先耗費力氣對抗羞愧感。練習方法很簡單：當你發現自己在自我攻擊時，暫停一下，問自己——如果是好朋友遇到同樣的事，我會對他說什麼？然後，把那句話說給自己聽。","practice":"寫下你最近對自己說過最嚴厲的一句話。接著想像好朋友遇到同樣的事，寫下你會對他說的話。最後把手輕放在胸口，把第二句話輕聲對自己說一遍。"},{"title":"小到不會失敗","body":"這週的最後一課，也是讓前面所有練習能持續的關鍵：把每一步切到小得幾乎不可能失敗。低落的時候能量本來就少，如果目標訂成「恢復運動習慣」，光看著就累了。小步驟原則是：與其計畫慢跑三十分鐘，不如先「換上運動鞋走到門口」；與其「整理房間」，不如「收好桌上三樣東西」。這不是降低標準，而是尊重你現在的狀態——完成一個小步驟帶來的「我做到了」，正是重建動力的原料，遠比一個沒執行的大計畫有用。覺得某件事做不下去時，先問：它的一半是什麼？一半的一半呢？小到你會點頭說「這個可以」，就對了。","practice":"想一件你這週一直拖著的事，把它連續砍半三次，直到剩下一個兩分鐘內能完成的最小版本，然後現在就去做那個版本。"}],"exercises":[{"name":"行為活化排程","intro":"當你提不起勁、越坐越低落時使用。行動會帶來動力，安排一個具體的小活動，是打破低落循環最有效的起點。","steps":["挑一個10分鐘內能完成的活動：可以是愉悅類（聽一首歌、泡杯茶、到樓下走走）或成就類（回一封訊息、洗碗、整理桌面）。","決定具體的時間和地點，例如「明天早上九點，在陽台喝一杯熱茶」，寫進行事曆或設好提醒。","執行前，用0到10分記下此刻的心情分數。","時間到了就開始，不管當下想不想做——只承諾「開始」，不要求做得完美。","完成後再記一次心情分數，比較前後差異，寫下一句觀察，例如「做完比想像中好一點」。","明天再挑一個活動重複安排，讓小活動慢慢排進每一天。"]},{"name":"平衡思考改寫","intro":"當一個負面想法在腦中盤旋、越想越沉重時使用。把想法寫下來檢視證據，比在腦中空轉更能鬆動它。","steps":["寫下觸發事件和當下的自動化想法，例如「同事沒回我訊息 → 他一定覺得我很煩」。","用0到100%評估你此刻有多相信這個想法。","檢查它有沒有貼標籤、過度類化或心理過濾的痕跡，有的話標記出來。","分兩欄寫下：支持這個想法的證據；不支持的證據（例外、其他可能的解釋、朋友會怎麼看）。","綜合兩欄，寫出一句更完整的平衡回應，例如「他可能只是在忙，過去他大多都會回我」。","重新評估你相信原本想法的程度，感受一下心情和身體有沒有鬆一點。"]}],"quick_tips":["不想動的時候，先做兩分鐘就好——開始比完成重要。","活動前後各記一次心情分數，讓改變被你看見。","聽到「總是」「永遠」就停一下，那通常是偏誤的訊號。","一天安排一件愉悅的事，加一件有成就感的事。","對自己說話前先想：這句話，我會對好朋友說嗎？","任務太大就砍半，再砍半，直到你點頭說「可以」。","低落時大腦只播壞消息，記得問：今天哪件事還順利？","想法不等於事實，寫下來，它就從判決變成待查的證詞。"]},"sleep":{"lessons":[{"title":"睡眠的兩股力量","body":"睡眠不是靠意志力，而是靠兩股自然的力量。第一股是「睡眠驅力」：你醒著的每一小時，大腦都在累積想睡的壓力，醒得越久、壓力越滿，就越容易入睡。第二股是「生理時鐘」：它依照光線和作息，在固定的時間讓你想睡、讓你清醒。睡不好的人常在不知不覺中削弱這兩股力量——白天補眠洩掉了睡眠驅力，作息不定打亂了生理時鐘。好消息是，這兩股力量都能重新培養。這一週，我們會一步步把它們找回來。你不需要「更努力睡」，只需要讓身體恢復它本來就會做的事。","practice":"花三分鐘回顧最近一週：你有沒有賴床補眠、午睡超過三十分鐘、或起床時間前後差超過一小時？把發現寫下來，這是你這週練習的起點。"},{"title":"床是睡覺的地方","body":"如果你常在床上滑手機、工作、翻來覆去地擔心，大腦會慢慢學會一件事：「床＝清醒和煩惱的地方」。於是一躺下，腦袋反而自動開機。CBT-I 裡最有效的做法之一叫「刺激控制」，目標是讓床重新只和睡覺連在一起。原則很簡單：想睡了才上床；床上只做睡覺這件事；躺了大約二十分鐘還很清醒，就起身到別的地方，在昏暗的燈光下做點安靜的事，有睡意再回床上。一開始可能要起來好幾次，這很正常——你不是失敗，而是在重新訓練大腦。持續幾週，「躺下就想睡」的感覺會慢慢回來。","practice":"把一項「不是睡覺」的活動移出床鋪（例如滑手機改到客廳）。再花五分鐘佈置你「睡不著時要去的位置」：一張舒服的椅子、一盞小燈、一本平淡的書。"},{"title":"固定起床時間","body":"如果整套課程你只能做一件事，就做這件：每天同一時間起床，包括週末。起床時間是生理時鐘的「錨」。你幾點睡可以有彈性，但幾點起床決定了身體何時開始累積睡眠驅力、何時發出想睡的訊號。睡不好的隔天賴床補眠，短期舒服，卻等於把時鐘往後撥，讓當晚更難入睡，形成惡性循環。前一晚睡得再糟，也試著在固定時間起床、拉開窗簾照照光——那一天會比較累沒錯，但你正在替當晚存下更強的睡意。連續做兩週，多數人會感覺入睡變快、半夜醒來的次數變少。","practice":"現在就決定你的固定起床時間——挑一個平日和假日都做得到的時間，設好鬧鐘，並把鬧鐘放在需要下床才關得掉的地方。"},{"title":"睡前緩衝儀式","body":"大腦不是電燈，沒辦法「啪」一聲關掉。如果你忙到最後一刻才躺上床，等於要求一台全速運轉的引擎瞬間熄火——它只會在床上繼續轟隆作響。睡前需要一段「緩衝時間」：至少三十分鐘，讓自己從「做事模式」慢慢降檔到「休息模式」。緩衝時間做什麼？原則是低刺激、不費腦、讓你舒服的事——伸展、聽輕音樂、洗溫水澡、整理明天要穿的衣服都可以。重點不在做什麼，而在「每天差不多一樣」：固定的順序會變成一種儀式，做著做著，身體就知道「快要睡覺了」。今晚就替自己排一段緩衝時間吧。","practice":"花五分鐘設計你的睡前儀式：挑二到三個低刺激的活動，排出固定順序（例如洗漱、伸展、聽音樂），寫下來貼在看得到的地方，今晚照著做一次。"},{"title":"安頓奔騰的思緒","body":"一躺下，腦袋就開始跑馬燈：明天的會議、還沒回的訊息、五年後的人生……這不是你的腦壞掉了，而是它在做份內的工作——提醒你「還有事沒處理」。問題是，凌晨一點不是處理事情的時間。解方是給大腦一個交代：在睡前緩衝時間（不是躺在床上時）花幾分鐘做「腦內傾倒」，把所有在腦中盤旋的擔心、待辦、雜念通通寫在紙上。研究發現，睡前寫下待辦清單的人入睡得更快，因為寫下來等於告訴大腦：「記下了，明天會處理。」它就不必半夜一直跳出來提醒你。紙上的事，交給明天的你接手。","practice":"今晚睡前一小時，拿一張紙計時五分鐘，把所有盤旋在腦中的事寫下來——擔心的、待辦的、瑣碎的都寫。寫完把紙留在臥室外面。"},{"title":"鬆動災難化想法","body":"半夜看著天花板，心想：「又睡不著，明天就完了。」這個念頭本身，就是失眠最好的燃料——它讓睡覺變成一場不能輸的考試，而焦慮緊繃的身體是睡不著的。試著問問自己：以前睡不好的隔天，我真的「完了」嗎？多數時候，你還是撐過了那一天——累、效率差一點，但天沒有塌。人在睡眠不足時，其實比自己預期的更能運作。試著把「明天就完了」換成更貼近事實的說法：「明天可能會累，但我應付得來，而且今晚少睡一點，反而讓明晚更好睡。」奇妙的是，當你不再逼自己非睡不可，睡意反而比較願意靠近。","practice":"寫下你最常出現的睡眠災難化想法，回想一次「睡很差但仍撐過去」的經驗，然後替這個想法寫一句更符合事實的回應，放在床頭。"},{"title":"睡眠衛生三關鍵","body":"最後，來檢查三個最常偷走睡眠的日常習慣。第一，咖啡因：它在體內代謝很慢，下午喝的咖啡、茶、可樂或能量飲，到了半夜可能還有一半留在血液裡，試著把最後一杯提前到中午前後。第二，螢幕：問題不只是藍光，更是內容——訊息、短影音、新聞都在對大腦喊「保持清醒」，讓緩衝時間失效，試著讓手機在睡前至少三十分鐘下班。第三，小睡：午睡不是不行，但超過三十分鐘或太接近傍晚，會洩掉你晚上需要的睡眠驅力，守住「三十分鐘內、下午三點前」。三個習慣不用一次全改，挑影響你最大的那個開始。","practice":"從咖啡因、螢幕、小睡中挑一個最影響你的，寫下一條本週要守的具體規則（例如「中午十二點後不喝咖啡」），並在手機設一個提醒。"}],"exercises":[{"name":"睡前腦內傾倒","intro":"睡前一小時使用。把盤旋的思緒全部寫出來，等於讓大腦安心「交接班」，能明顯減少躺床後的思緒奔騰。","steps":["睡前約一小時，拿紙筆坐在床以外的地方，計時五分鐘。","把腦中所有的事寫下來：擔心、待辦、雜念，不分大小、不修飾、不排序。","針對明天必須處理的事，在旁邊寫一個簡單的下一步（例如「報告→早上先列大綱」）。","對暫時無解的擔心，在旁邊註記「現在做不了什麼」，允許它先留在紙上。","寫完把紙闔上、留在臥室外，對自己說：「記下了，剩下的交給明天的我。」","躺床後思緒若又冒出來，輕輕提醒自己：「已經在紙上了。」"]},{"name":"睡不著時怎麼辦","intro":"躺了約二十分鐘仍很清醒、或半夜醒來睡不回去時使用。透過離開床鋪，重建「床＝睡覺」的連結。","steps":["不要盯著時鐘算時間，憑感覺就好：覺得清醒了約二十分鐘、開始煩躁，就是起身的時機。","起身離開床（最好離開臥室），到事先準備好的椅子上，只開昏暗的小燈。","做一件安靜、無聊、不用螢幕的事：翻翻平淡的書、聽輕柔的音樂、做幾次緩慢的呼吸。","等到眼皮變重、出現明顯睡意時，才回到床上。","回床後若又清醒超過二十分鐘，就重複同樣的流程。一晚起來好幾次很正常，這是訓練的一部分，不是失敗。"]},{"name":"漸進式肌肉放鬆","intro":"睡前緩衝時間或躺床後身體緊繃時使用。透過「先繃緊、再放鬆」，幫身體從做事模式切換到休息模式。","steps":["躺著或坐著，閉上眼睛，先做三次緩慢的深呼吸。","從雙手開始：用力握拳五秒，感受緊繃，然後一口氣鬆開十秒，注意放鬆的感覺。","依序往上：前臂、肩膀、臉部——每個部位都繃緊五秒、放鬆十秒。","接著往下：腹部、大腿、小腿、腳掌，同樣繃緊再放鬆。","全部做完後，安靜躺一分鐘，感受全身鬆沉的重量。"]}],"quick_tips":["中午過後就別再碰咖啡因，包括茶、可樂和能量飲。","只有想睡了才上床，別提早躺著「等睡意」。","半夜醒來別看時鐘，計算還能睡多久只會讓你更清醒。","不管昨晚睡得好壞，每天同一時間起床，週末也一樣。","起床後盡快拉開窗簾曬曬光，幫生理時鐘對時。","睡前三十分鐘讓手機下班，放在伸手拿不到的地方。","想午睡就守住兩條線：三十分鐘內、下午三點前。","睡不好的隔天照常生活，別取消行程或提早上床補償。"]},"stress":{"lessons":[{"title":"拖延不是懶惰","body":"拖延很少是因為懶，更常是因為那件事引發了不舒服的感覺——焦慮、怕做不好、覺得被壓垮。逃開的那一刻，你會立刻鬆一口氣，但這份紓解正是問題所在：大腦學到「逃避＝舒服」，下次面對同樣的任務，逃避的衝動會更強。這就是拖延的迴圈：不舒服→逃避→短暫紓解→更強的拖延。CBT 的做法不是逼自己更自律，而是先看清楚這個迴圈。當你能指認「我現在是在逃避某種感覺」，你就多了一個選擇的空間。這一課先不用改變什麼，開始觀察就好。","practice":"想一件你最近一直拖延的事，花 3 分鐘寫下三件事：(1) 那件事是什麼 (2) 一想到它，身體和心裡出現什麼感覺 (3) 你通常用什麼方式逃開（滑手機、整理房間、突然去做別的事）。只要寫下來，今天不用去做那件事。"},{"title":"五分鐘啟動法","body":"拖延最難的是「開始」，因為我們常把整件任務的重量，全部壓在起步的那一刻。五分鐘啟動法的原理很簡單：跟自己約定「只做五分鐘，時間到就可以停」。這句話能大幅降低啟動門檻——五分鐘的不舒服，任何人都撐得住。有趣的是，一旦開始，任務引發的焦慮往往比想像中小，很多人五分鐘到了會自然想繼續。這叫「行為帶動動機」：不是等有動力才行動，而是行動之後動力才出現。就算你真的只做五分鐘就停，也完全算成功，因為你打破了「逃避→紓解」的迴圈一次。","practice":"現在就挑一件拖延中的事，設一個 5 分鐘計時器，只做最小的動作，例如「打開檔案」「寫下第一行」。時間到，無論做了多少都可以停（想繼續也可以），然後對自己說：「我啟動了，這就算數。」"},{"title":"把大象切小塊","body":"「寫報告」「整理財務」這種模糊又龐大的任務，最容易被拖延——因為大腦不知道從哪裡下手，就直接判定「太難，先逃」。任務拆解的關鍵是：把任務切到「小到不會想逃」的程度。判斷標準有兩個：第一，每一步 15 分鐘內能完成；第二，每一步都是具體的「動作」，不是模糊的目標。「準備簡報」不是動作，「打開空白簡報檔、列出三個標題」才是。切好之後，你只需要面對眼前那一小步，其他的先放著。每完成一步就打勾——完成感本身，就是最好的動力來源。","practice":"挑一件卡住的任務，花 5 分鐘把它拆成 4 到 6 個小步驟：每一步都以動詞開頭（打開、列出、寫下、寄出），並確認第一步小到「現在就能做」。今天只需要完成拆解，不用執行。"},{"title":"鬆動「應該」","body":"留意你腦中的句子：「我應該做得更快」「我必須不能出錯」「這種小事不該讓我有壓力」。這些「應該／必須」句型是完美主義的燃料——它們把「期待」變成「命令」，一旦做不到，就自動轉成自我批評，帶來更多壓力和逃避。CBT 稱之為「應該式思考」。鬆動它的方法不是全部丟掉，而是換成更貼近現實的說法：把「我必須做到完美」換成「我希望做好，而且允許自己有限度」；把「我不應該累」換成「我累了，這很正常」。同一件事，句子換了，壓在你身上的重量就不一樣了。","practice":"花 5 分鐘，寫下今天腦中出現過的一句「我應該／我必須……」，然後把它改寫成「我希望……，而且……」的版本。兩句都唸出來，感受一下它們帶給你的壓力有什麼不同。"},{"title":"夠好，就真的好","body":"追求卓越和完美主義看起來很像，方向卻相反。追求卓越是「我想把事情做好」，動力來自興趣和價值；完美主義是「我不能做不好」，動力來自恐懼——怕批評、怕失敗、怕不夠格。前者讓你進步，後者讓你耗竭、拖延，甚至不敢開始。「夠好就好」不是降低標準，而是問一個更聰明的問題：「這件事需要做到幾分，才算達成目的？」一封內部信也許 70 分就夠，重要提案可能需要 90 分——但沒有任何事需要 100 分再加上反覆檢查十次。把省下來的力氣，留給真正重要的事。","practice":"挑一件你正在做（或拖延中）的事，花 3 分鐘寫下：這件事的「目的」是什麼？做到幾分就足以達成目的？然後訂出一個明確的「完成即停」標準，例如「檢查一次就送出」，並照著執行。"},{"title":"壓力下的自我對話","body":"壓力大的時候，注意你對自己說話的語氣。很多人心裡住著一位嚴厲的教練：「你怎麼還沒做完」「別人都可以，就你不行」。但自我批評並不會提升表現，反而升高焦慮、加重逃避。CBT 的替代做法是「像對朋友說話一樣對自己說話」：同樣的處境，如果是你最好的朋友遇到，你會怎麼說？大概不是罵他，而是「這確實不容易，你已經在處理了，先做一小步就好」。這不是自我安慰或找藉口，而是換一種真正有效的驅動方式——支持，比鞭打更能讓人動起來。","practice":"回想今天一個讓你有壓力的時刻，花 5 分鐘寫下你當時對自己說的話。接著寫下「如果是好朋友遇到同樣的事，我會對他說什麼」，然後把那句話唸給自己聽。"},{"title":"我的維持計畫","body":"恭喜你走到 28 天的最後一課。狀態本來就會起伏，重點不是從此不再拖延或焦慮，而是波動來的時候，你知道怎麼接住自己。今天請完成三件事。第一，回顧：這四週裡，哪兩、三個技巧對你最有用？五分鐘啟動、思考紀錄、還是呼吸練習？第二，警訊清單：狀態變差之前，你會先出現什麼訊號？例如連續熬夜、開始迴避訊息、腦中的「應該」變多。第三，行動計畫：警訊出現時，你的前三步是什麼？把這份計畫寫下來，放在看得到的地方。偶爾退步不是失敗，而是拿出計畫來用的時機。","practice":"花 5 分鐘寫下你的「維持計畫卡」：(1) 這四週最有用的三個技巧 (2) 三個屬於你的警訊 (3) 警訊出現時的三步行動，例如：做一次五分鐘啟動、寫一則思考紀錄、找一個信任的人聊聊。寫完拍照存進手機。"}],"exercises":[{"name":"五分鐘啟動","intro":"當你面對一件一直逃避、遲遲無法開始的任務時使用；它有效是因為把門檻降到最低，讓行動帶動動機，直接打破「逃避→紓解」的迴圈。","steps":["選一件你正在拖延的任務，寫下它的名字。","設定一個「微目標」：小到五分鐘內一定做得到的具體動作，例如「打開檔案並寫下標題」，而不是「開始寫報告」。","設 5 分鐘計時器，開始執行，過程中不追求品質，只求「有在動」。","時間到就停下來問自己：「想繼續嗎？」想就再約五分鐘，不想就結束。","不論做了多少，對自己說：「我啟動了，這次算成功。」"]},{"name":"任務拆解","intro":"當任務大到讓你不知從何下手、一想到就想逃時使用；把任務切小，能讓大腦從「太難，快逃」模式回到「這我可以處理」模式。","steps":["把任務名稱寫在紙的最上方。","問自己：「完成它需要哪些動作？」把想得到的步驟全部列出來。","逐一檢查每個步驟：15 分鐘內做得完嗎？是不是以動詞開頭、夠具體？不夠就再切小。","把步驟排出順序，圈出「今天只做這一步」的第一步。","每完成一步就打勾，停下來感受一下完成感，再決定要不要往下一步。"]},{"name":"朋友視角練習","intro":"當你發現自己正在自我批評、越罵壓力越大時使用；用對待好朋友的語氣取代苛責，能降低焦慮，讓下一步行動更容易發生。","steps":["寫下你剛剛對自己說的那句批評，一字不改地記錄下來。","想像你最好的朋友遇到一模一樣的處境。","寫下你會對他說的話——誠實但溫和，帶著支持而不是責備。","把那句話改成對自己說（把「你」換成「我」），唸出來一次。","接著做一個五分鐘內能完成的小行動，讓支持接上行動。"]}],"quick_tips":["想逃的那一刻，先說出：「我在逃避一種感覺。」","別等有動力才開始；先開始，動力才會來。","任務要切到「小到不會想逃」為止。","把「我必須」換成「我希望」，重量立刻不同。","先問：這件事做到幾分就夠了？","用對好朋友說話的語氣，跟自己說話。","完成勝過完美：先交出 70 分，需要再修。","退步不是歸零，是拿出維持計畫的時機。"]},"safety":{"weekly_checkin":{"intro":"每週花一分鐘，透過下面四題看看自己最近的狀態。請回想「過去兩週」，你被以下情況困擾的頻率：0＝完全沒有、1＝有幾天、2＝一半以上天數、3＝幾乎每天。沒有標準答案，誠實作答就是照顧自己的第一步。","items":[{"text":"做事時提不起勁或沒有樂趣","scale_type":"phq"},{"text":"感到心情低落、沮喪或絕望","scale_type":"phq"},{"text":"感覺緊張、焦慮或急躁不安","scale_type":"gad"},{"text":"無法停止或控制擔憂","scale_type":"gad"}],"scoring_note":"計分方式很簡單：前兩題（情緒）加總為一組，後兩題（焦慮）加總為一組。任一組合計達 3 分以上，表示這段時間你可能過得比較辛苦，建議找專業人員——例如心理師或身心科醫師——聊一聊，做進一步的了解。這不是診斷，也不代表你「有問題」，只是一個溫柔的提醒：讓多一個人陪你看看現在的狀態，往往會輕鬆許多。"}}};

/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'id' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

function todayKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function keyToDate(k) { const p = k.split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];
function fmtDate(k, withWd) {
  const d = keyToDate(k);
  return (d.getMonth() + 1) + '月' + d.getDate() + '日' + (withWd ? ' 週' + WEEKDAYS[d.getDay()] : '');
}
function daysBetween(k1, k2) { return Math.round((keyToDate(k2) - keyToDate(k1)) / 86400000); }

let toastTimer = null;
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ================= storage ================= */
const STORE_KEY = 'cbt.xinqing.v1';
let storageOk = true;

const DEFAULT_DATA = () => ({
  version: 1,
  onboarded: false,
  theme: null,
  program: { day: 1, completed: {} },
  checkins: {},
  thoughts: [],
  worries: [],
  activities: [],
  braindumps: [],
  assessments: []
});

function sanitizeData(d) {
  const base = DEFAULT_DATA();
  if (!d || typeof d !== 'object') return base;
  const isObj = x => x && typeof x === 'object' && !Array.isArray(x);
  const arr = x => Array.isArray(x) ? x.filter(isObj) : [];
  const num = (v, lo, hi, def) => { const n = Number(v); return isFinite(n) ? Math.max(lo, Math.min(hi, Math.round(n))) : def; };
  const str = (v, max) => v == null ? '' : String(v).slice(0, max || 4000);
  const dstr = v => /^\d{4}-\d{2}-\d{2}$/.test(String(v)) ? String(v) : todayKey();
  const sid = v => (typeof v === 'string' && /^[\w-]{1,40}$/.test(v)) ? v : uid();
  const out = base;
  out.onboarded = !!d.onboarded;
  out.theme = (d.theme === 'light' || d.theme === 'dark') ? d.theme : null;
  if (isObj(d.checkins)) Object.keys(d.checkins).forEach(k => {
    const c = d.checkins[k];

let modalGuard = null, lastFocused = null;
function openModal(html, guard) {
  closeModal();

  lastFocused = document.activeElement;
  const root = $('#modal-root');
  root.innerHTML = '<div class="modal-veil"><div class="modal-box" role="dialog" aria-modal="true" tabindex="-1">' +
    '<button class="modal-close" aria-label="關閉">✕</button>' + html + '</div></div>';
  const veil = root.firstElementChild;
  const box = veil.querySelector('.modal-box');
  veil.addEventListener('click', e => { if (e.target === veil) requestCloseModal(); });
  veil.querySelector('.modal-close').addEventListener('click', requestCloseModal);
  const h2 = box.querySelector('h2');
  if (h2) { if (!h2.id) h2.id = 'modal-title-x'; box.setAttribute('aria-labelledby', h2.id); }
  box.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const f = Array.from(box.querySelectorAll('button,[href],input,select,textarea')).filter(el => !el.disabled && el.offsetParent !== null);
    if (!f.length) return;
    const first = f[0], last = f[f.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  document.body.style.overflow = 'hidden';
  box.focus();
  return box;
}
function requestCloseModal() {
  const g = typeof modalGuard === 'function' ? modalGuard() : modalGuard;
  if (g && !window.confirm(g)) return;
  closeModal();
}
function closeModal() {
  modalGuard = null;
  clearActiveTimer();
  $('#modal-root').innerHTML = '';
  document.body.style.overflow = '';
  if (lastFocused && document.contains(lastFocused) && lastFocused.focus) lastFocused.focus();
  lastFocused = null;
}
document.addEventListener('keydown', e => {

});

/* ================= liquid lens drag ================= */
const tabbarEl = document.querySelector('.tabbar');
const tabInner = tabbarEl.querySelector('.inner');
const tabLens = document.getElementById('tabLens');
const tabBtns = $$('.tab');
function updateTabLens() {
  const act = tabInner.querySelector('.tab.on');
  if (!act) return;
  tabLens.style.width = act.offsetWidth + 'px';
  tabLens.style.left = act.offsetLeft + 'px';
}
window.addEventListener('resize', updateTabLens);
(function () {
  let pressing = false, dragging = false, suppressClick = false, lastX = 0, lastT = 0;
  function nearestTab(clientX) {
    const r = tabInner.getBoundingClientRect();
    const xr = clientX - r.left;
    let best = null, bd = Infinity;
    tabBtns.forEach(b => {
      const c = b.offsetLeft + b.offsetWidth / 2;
      const d = Math.abs(c - xr);
      if (d < bd) { bd = d; best = b; }
    });
    return best;
  }
  function clearNear() { tabBtns.forEach(b => b.classList.remove('near')); }
  function moveLens(clientX) {
    const r = tabInner.getBoundingClientRect();
    const w = tabLens.offsetWidth;
    let left = clientX - r.left - w / 2;
    left = Math.max(6, Math.min(r.width - w - 6, left));
    tabLens.style.left = left + 'px';
    const now = performance.now();
    const v = Math.abs(clientX - lastX) / Math.max(1, now - lastT);
    const s = Math.min(0.16, v * 0.12);
    tabLens.style.transform = 'scaleX(' + (1 + s).toFixed(3) + ') scaleY(' + (1 - s * 0.5).toFixed(3) + ')';
    lastX = clientX; lastT = now;
    const nb = nearestTab(clientX);
    tabBtns.forEach(b => b.classList.toggle('near', b === nb));
  }
  tabbarEl.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    pressing = true; dragging = false;
    lastX = e.clientX; lastT = performance.now();
  });
  tabbarEl.addEventListener('pointermove', e => {
    if (!pressing) return;
    if (!dragging && Math.abs(e.clientX - lastX) > 6) {
      dragging = true;
      tabLens.classList.add('drag');
      try { tabbarEl.setPointerCapture(e.pointerId); } catch (err) { }
    }
    if (dragging) moveLens(e.clientX);
  });
  tabbarEl.addEventListener('pointerup', e => {
    if (dragging) {
      const nb = nearestTab(e.clientX);
      tabLens.classList.remove('drag');
      tabLens.style.transform = '';
      clearNear();
      suppressClick = true;
      if (nb && nb.dataset.v !== currentView) show(nb.dataset.v);
      else updateTabLens();
    }
    pressing = false; dragging = false;
  });
  tabbarEl.addEventListener('pointercancel', () => {
    pressing = false;
    if (dragging) {
      dragging = false;
      tabLens.classList.remove('drag');
      tabLens.style.transform = '';
      clearNear();
      updateTabLens();
    }
  });
  tabbarEl.addEventListener('click', e => {
    if (suppressClick) { suppressClick = false; e.preventDefault(); e.stopPropagation(); }
  }, true);
})();

function assessmentDue() {
  if (!D.assessments.length) return Object.keys(D.checkins).length >= 1;
  return daysBetween(D.assessments[0].date, todayKey()) >= 7;
}
function openAssessment() {
  const wc = CONTENT.safety.weekly_checkin;
  const answers = [null, null, null, null];
  const box = openModal(
    '<h2>每週自我檢測</h2><p class="sub">' + esc(wc.intro) + '</p>' +
    wc.items.map((it, i) =>
      '<div class="field"><label>' + (i + 1) + '. ' + esc(it.text) + '</label>' +
      '<div class="pill-scale" data-q="' + i + '" role="radiogroup" aria-label="' + esc(it.text) + '">' +
      ['完全沒有', '有幾天', '一半以上', '幾乎每天'].map((lab, s) =>
        '<button type="button" role="radio" aria-checked="false" data-s="' + s + '">' + s + '<br>' + lab + '</button>').join('') +
      '</div></div>').join('') +
    '<button class="btn block" id="as-submit" disabled>看看結果</button>',
    () => answers.some(a => a !== null) ? '要離開檢測嗎？這次的回答不會保存。' : null);
  box.querySelectorAll('.pill-scale').forEach(row => {
    row.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      answers[+row.dataset.q] = +b.dataset.s;
      row.querySelectorAll('button').forEach(x => {
        x.classList.toggle('on', x === b);
        x.setAttribute('aria-checked', x === b ? 'true' : 'false');
      });
      box.querySelector('#as-submit').disabled = answers.some(a => a === null);
    });
  });
  box.querySelector('#as-submit').addEventListener('click', () => {
    const items = wc.items;
    let phq = 0, gad = 0;
    items.forEach((it, i) => { if (it.scale_type === 'phq') phq += answers[i]; else gad += answers[i]; });
    D.assessments.unshift({ id: uid(), date: todayKey(), answers: answers.slice(), phq: phq, gad: gad });
    save();
    openModal('<h2>本週結果</h2>' +
      '<div class="stat-tiles" style="grid-template-columns:1fr 1fr">' +
      '<div class="stat-tile"><div class="n">' + phq + '<span class="mut">／6</span></div><div class="l">情緒（PHQ-2）</div></div>' +
      '<div class="stat-tile"><div class="n">' + gad + '<span class="mut">／6</span></div><div class="l">焦慮（GAD-2）</div></div></div>' +
      '<p class="body-text" style="font-size:13.5px;color:var(--ink2)">' + esc(wc.scoring_note) + '</p>' +
      '<button class="btn block ghost" id="as-close" style="margin-top:12px">好的</button>');
    const c = $('#modal-root');
    c.querySelector('#as-close').addEventListener('click', () => { closeModal(); if (currentView === 'today') renderers.today(); else renderers[currentView](); });
  });
}

function openTool(key) {
  if (key === 'thought') openThoughtWizard();

}

/* ---------- thought record wizard ---------- */
function openThoughtWizard() {
  const w = { step: 0, situation: '', emotion: '', before: 60, thought: '', distortions: [], evFor: '', evAgainst: '', balanced: '', after: 60 };
  const TOTAL = 7;

  function head(title, sub) {
    let dots = '';
    for (let i = 0; i < TOTAL; i++) dots += '<i class="' + (i <= w.step ? 'done' : '') + '"></i>';
    return '<h2>' + title + '</h2><p class="sub">' + sub + '</p><div class="stepper-dots">' + dots + '</div>';
  }
  function nav(canNext, nextLabel) {
    return '<div class="step-nav">' +
      (w.step > 0 ? '<button class="btn ghost" id="tw-back">上一步</button>' : '') +
      '<button class="btn" id="tw-next"' + (canNext ? '' : ' disabled') + '>' + (nextLabel || '下一步') + '</button></div>';
  }
  function render() {
    let html = '';
    if (w.step === 0) {
      html = head('思考紀錄', '第一步：發生了什麼事？只寫客觀事實就好。') +
        '<div class="field"><textarea id="tw-in" placeholder="例如：主管回訊息只寫了「再說」">' + esc(w.situation) + '</textarea></div>' + nav(true);
    } else if (w.step === 1) {
      html = head('當時的感受', '用一兩個詞描述情緒，並評估它的強度。') +
        '<div class="field"><label for="tw-in">情緒（例如：焦慮、沮喪、委屈）</label>' +
        '<input type="text" id="tw-in" maxlength="30" value="' + esc(w.emotion) + '"></div>' +
        sliderRow('tw-int', '強度', w.before, 0, 100, '0 幾乎沒有', '100 非常強烈') + nav(true);
    } else if (w.step === 2) {
      html = head('自動化想法', '那一刻，腦中閃過什麼念頭？原封不動寫下來。') +
        '<div class="field"><textarea id="tw-in" placeholder="例如：他一定對我很失望">' + esc(w.thought) + '</textarea></div>' + nav(true);
    } else if (w.step === 3) {
      html = head('這像哪種思考習慣？', '選出符合的（可複選，也可以都不選）。') +
        '<div class="chip-row">' + DISTORTIONS.map(d =>
          '<button type="button" class="chip' + (w.distortions.indexOf(d.name) >= 0 ? ' on' : '') + '" aria-pressed="' + (w.distortions.indexOf(d.name) >= 0 ? 'true' : 'false') + '" data-d="' + esc(d.name) + '" title="' + esc(d.desc) + '">' + esc(d.name) + '</button>').join('') + '</div>' +
        '<p class="mut" style="margin-top:10px">不確定沒關係，「學習」頁有每一種的說明與例子。</p>' + nav(true);
    } else if (w.step === 4) {
      html = head('檢視證據', '像個公正的偵探：這個想法，證據站得住腳嗎？') +
        '<div class="field"><label for="tw-for">支持這個想法的證據</label><textarea id="tw-for" placeholder="有哪些事實支持它？">' + esc(w.evFor) + '</textarea></div>' +
        '<div class="field"><label for="tw-against">不支持的證據（例外、其他解釋、朋友會怎麼看）</label><textarea id="tw-against" placeholder="有哪些事實不支持它？">' + esc(w.evAgainst) + '</textarea></div>' + nav(true);
    } else if (w.step === 5) {
      html = head('平衡想法', '綜合兩邊證據，寫一句更完整、更公平的話。不必強迫正向，貼近事實就好。') +
        '<div class="field"><textarea id="tw-in" placeholder="例如：他回得短可能只是在忙，過去他大多會好好回我">' + esc(w.balanced) + '</textarea></div>' + nav(true);
    } else {
      html = head('重新評分', '帶著平衡想法，再感受一次原本的情緒「' + esc(w.emotion || '—') + '」。') +
        sliderRow('tw-int', '現在的強度', w.after, 0, 100, '0 幾乎沒有', '100 非常強烈') +
        '<div class="notice">原本強度：' + w.before + '。強度沒有大降也完全正常——重點是練習「看見並檢視念頭」這個動作本身。</div>' +
        nav(true, '儲存紀錄');
    }
    const box = openModal(html, () => {
      const cur = document.querySelector('#tw-in');
      const typed = w.situation || w.thought || w.balanced || w.evFor || w.evAgainst || (cur && cur.value.trim());
      return typed ? '要放棄這筆思考紀錄嗎？目前的輸入不會保存。' : null;
    });
    if (box.querySelector('#tw-int')) bindSlider(box, 'tw-int');
    if (w.step === 3) box.querySelectorAll('[data-d]').forEach(c => c.addEventListener('click', () => {
      const n = c.dataset.d, i = w.distortions.indexOf(n);
      if (i >= 0) w.distortions.splice(i, 1); else w.distortions.push(n);
      c.classList.toggle('on');
      c.setAttribute('aria-pressed', c.classList.contains('on') ? 'true' : 'false');
    }));
    const collect = () => {
      const g = id => { const e = box.querySelector('#' + id); return e ? e.value : null; };
      if (w.step === 0) w.situation = g('tw-in').trim();
      if (w.step === 1) { w.emotion = g('tw-in').trim(); w.before = +g('tw-int'); }
      if (w.step === 2) w.thought = g('tw-in').trim();
      if (w.step === 4) { w.evFor = g('tw-for').trim(); w.evAgainst = g('tw-against').trim(); }
      if (w.step === 5) w.balanced = g('tw-in').trim();
      if (w.step === 6) w.after = +g('tw-int');
    };
    const back = box.querySelector('#tw-back');
    if (back) back.addEventListener('click', () => { collect(); w.step--; render(); });
    box.querySelector('#tw-next').addEventListener('click', () => {
      collect();
      if (w.step === 0 && !w.situation) { toast('先寫一句發生了什麼事'); return; }
      if (w.step === 2 && !w.thought) { toast('把腦中的念頭寫下來'); return; }
      if (w.step < 6) { w.step++; render(); return; }
      D.thoughts.unshift({ id: uid(), date: todayKey(), situation: w.situation, emotion: w.emotion, before: w.before, thought: w.thought, distortions: w.distortions, evFor: w.evFor, evAgainst: w.evAgainst, balanced: w.balanced, after: w.after });
      save(); closeModal();
      toast('已儲存。能看見念頭，就已經和它拉開距離了');
      if (currentView === 'history') renderers.history();
    });
  }
  render();
}

/* ---------- breathing ---------- */
function openBreathing() {
  const MODES = {
    calm: { name: '4-6 呼吸（安定）', phases: [{ lab: '吸氣', s: 4, sc: 1 }, { lab: '吐氣', s: 6, sc: 0.72 }] },
    box: { name: '盒式呼吸（專注）', phases: [{ lab: '吸氣', s: 4, sc: 1 }, { lab: '停留', s: 4, sc: 1 }, { lab: '吐氣', s: 4, sc: 0.72 }, { lab: '停留', s: 4, sc: 0.72 }] }
  };
  let mode = 'calm', mins = 3, running = false;
  const box = openModal(
    '<h2>呼吸練習</h2><p class="sub">拉長吐氣會啟動身體的放鬆反應。坐好，跟著圓圈就好。</p>' +
    '<div class="chip-row" id="br-modes">' +
    Object.keys(MODES).map(k => '<button type="button" class="chip' + (k === mode ? ' on' : '') + '" data-m="' + k + '">' + MODES[k].name + '</button>').join('') + '</div>' +
    '<div class="chip-row" id="br-mins">' +
    [1, 3, 5].map(m => '<button type="button" class="chip' + (m === mins ? ' on' : '') + '" data-min="' + m + '">' + m + ' 分鐘</button>').join('') + '</div>' +
    '<div class="breath-stage"><div class="breath-orb" id="br-orb"><span class="ph" id="br-ph">準備</span></div>' +
    '<div class="breath-count" id="br-count">按下開始，跟著節奏呼吸</div></div>' +
    '<button class="btn block" id="br-go">開始</button>');
  const orb = box.querySelector('#br-orb'), ph = box.querySelector('#br-ph'),
    cnt = box.querySelector('#br-count'), go = box.querySelector('#br-go');
  box.querySelector('#br-modes').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b || running) return;
    mode = b.dataset.m;
    box.querySelectorAll('#br-modes .chip').forEach(x => x.classList.toggle('on', x === b));
  });
  box.querySelector('#br-mins').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b || running) return;
    mins = +b.dataset.min;
    box.querySelectorAll('#br-mins .chip').forEach(x => x.classList.toggle('on', x === b));
  });
  go.addEventListener('click', () => {
    if (running) { stop('先停在這裡，也很好'); return; }
    running = true; go.textContent = '停止';
    const phases = MODES[mode].phases;
    let total = mins * 60, pi = -1, left = 0;
    const tick = () => {
      if (left <= 0) {
        pi = (pi + 1) % phases.length;
        const p = phases[pi];
        left = p.s;
        ph.textContent = p.lab;
        orb.style.transitionDuration = p.s + 's';
        orb.style.transform = 'scale(' + p.sc + ')';
      }
      cnt.textContent = ph.textContent + ' ' + left + ' · 剩餘 ' + Math.floor(total / 60) + ':' + String(total % 60).padStart(2, '0');
      left--; total--;
      if (total < 0) stop('做得很好。留意一下，身體哪裡鬆了一點？');
    };
    clearActiveTimer();
    tick();
    activeTimer = setInterval(tick, 1000);
  });
  function stop(msg) {
    clearActiveTimer(); running = false;
    go.textContent = '再來一次';
    ph.textContent = '完成';
    cnt.textContent = msg;
    orb.style.transitionDuration = '1s';
    orb.style.transform = 'scale(.72)';
  }
}

/* ---------- worry list ---------- */
function openWorry() {
  const box = openModal(
    '<h2>擔憂清單</h2><p class="sub">寫下來，大腦就不用一直提醒你。再分類：可控的化成小行動，不可控的練習放下。建議搭配每天固定 15 分鐘的「擔憂時間」統一處理。</p>' +
    '<div class="field" style="display:flex;gap:8px;align-items:stretch"><input type="text" id="wy-in" maxlength="120" placeholder="現在在擔心什麼？" style="flex:1;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;background:var(--card)">' +
    '<button class="btn" id="wy-add">記下</button></div><div id="wy-list"></div>');
  const list = box.querySelector('#wy-list');
  function renderList() {
    const open = D.worries.filter(x => !x.done), done = D.worries.filter(x => x.done);
    list.innerHTML = (open.length + done.length === 0) ? '<div class="empty">清單是空的——腦中的擔憂，寫下來就小一半。</div>' :
      open.concat(done.slice(0, 5)).map(x =>
        '<div class="item-row' + (x.done ? ' done' : '') + '">' +
        '<button class="check-btn' + (x.done ? ' on' : '') + '" data-act="done" data-id="' + esc(x.id) + '" aria-label="完成" aria-pressed="' + (x.done ? 'true' : 'false') + '"></button>' +
        '<div class="grow"><div class="t">' + esc(x.text) + '</div>' +
        '<div class="d">' + fmtDate(x.date) + (x.nextStep ? ' · 下一步：' + esc(x.nextStep) : '') + '</div>' +
        (!x.done && !x.kind ? '<div class="chip-row" style="margin:8px 0 0"><button type="button" class="chip" data-act="kind" data-kind="c" data-id="' + esc(x.id) + '">我可以影響它</button><button type="button" class="chip" data-act="kind" data-kind="u" data-id="' + esc(x.id) + '">不在我手上</button></div>' : '') +
        (!x.done && x.kind === 'c' && !x.nextStep ? '<div style="display:flex;gap:6px;margin-top:8px"><input type="text" maxlength="80" placeholder="5 分鐘內能做的一小步？" data-step-in="' + esc(x.id) + '" style="flex:1;border:1px solid var(--line2);border-radius:8px;padding:7px 10px;background:var(--card);font-size:13px"><button class="btn sm" data-act="step" data-id="' + esc(x.id) + '">存</button></div>' : '') +
        (!x.done && x.kind === 'u' ? '<div class="mut" style="margin-top:4px">✦ 不在你手上的事，練習交還給它。把注意力帶回眼前能做的小事。</div>' : '') +
        '</div>' +
        (x.kind ? '<span class="badge ' + (x.kind === 'c' ? 'g' : 'v') + '">' + (x.kind === 'c' ? '可控' : '不可控') + '</span>' : '') +
        '<button class="linklike" data-act="del" data-id="' + esc(x.id) + '" aria-label="刪除" style="color:var(--muted);text-decoration:none">✕</button></div>').join('');
  }
  function add() {
    const inp = box.querySelector('#wy-in');
    const t = inp.value.trim(); if (!t) return;
    D.worries.unshift({ id: uid(), date: todayKey(), text: t, kind: null, nextStep: '', done: false });
    save(); inp.value = ''; renderList();
  }
  box.querySelector('#wy-add').addEventListener('click', add);
  box.querySelector('#wy-in').addEventListener('keydown', e => { if (e.isComposing || e.keyCode === 229) return; if (e.key === 'Enter') add(); });
  list.addEventListener('click', e => {
    const b = e.target.closest('[data-act]'); if (!b) return;
    const x = D.worries.find(w => w.id === b.dataset.id); if (!x) return;
    if (b.dataset.act === 'done') x.done = !x.done;
    else if (b.dataset.act === 'kind') x.kind = b.dataset.kind;
    else if (b.dataset.act === 'del') D.worries = D.worries.filter(w => w.id !== x.id);
    else if (b.dataset.act === 'step') {
      const inp = list.querySelector('[data-step-in="' + x.id + '"]');
      if (inp && inp.value.trim()) { x.nextStep = inp.value.trim(); toast('很好，行動會讓擔憂縮小'); }
    }
    save(); renderList();
  });
  renderList();
}

        '<button class="linklike" data-act="del" data-id="' + esc(a.id) + '" aria-label="刪除" style="color:var(--muted);text-decoration:none">✕</button></div>').join('');
  }
  function add(text, type) {
    if (!text) return;
    D.activities.unshift({ id: uid(), date: tk, text: text, type: type, done: false });
    save(); renderList(); toast('排進今天了——只承諾開始，不要求完美');
  }
  box.querySelectorAll('[data-idea]').forEach(c => c.addEventListener('click', () => add(c.dataset.idea, c.dataset.type)));
  box.querySelector('#ac-add-joy').addEventListener('click', () => { add(box.querySelector('#ac-in').value.trim(), 'joy'); box.querySelector('#ac-in').value = ''; });
  box.querySelector('#ac-add-win').addEventListener('click', () => { add(box.querySelector('#ac-in').value.trim(), 'win'); box.querySelector('#ac-in').value = ''; });
  list.addEventListener('click', e => {
    const b = e.target.closest('[data-act]'); if (!b) return;
    const a = D.activities.find(x => x.id === b.dataset.id); if (!a) return;
    if (b.dataset.act === 'done') { a.done = !a.done; if (a.done) toast('完成 ✓ 留意一下心情有沒有一點點不同'); }
    else D.activities = D.activities.filter(x => x.id !== a.id);
    save(); renderList();
  });
  renderList();
}

/* ---------- five minute start ---------- */
function openFiveMin() {
  const box = openModal(
    '<h2>五分鐘啟動</h2><p class="sub">拖延的解藥不是意志力，是把門檻降到最低。只承諾五分鐘——時間到了，要停要繼續都可以。</p>' +
    '<div class="field"><label for="fm-goal">這五分鐘，你要碰哪件事？</label>' +
    '<input type="text" id="fm-goal" maxlength="60" placeholder="例如：打開報告檔案，寫第一段"></div>' +
    '<div class="timer-big" id="fm-time">5:00</div>' +
    '<div class="step-nav"><button class="btn ghost" id="fm-reset">重設</button><button class="btn ghost" id="fm-done">提前做完了</button><button class="btn" id="fm-go">開始</button></div>' +
    '<p class="mut" style="text-align:center;margin-top:8px">提早停下也算成功——開始本身就是勝利。</p>');
  let left = 300, running = false;
  const timeEl = box.querySelector('#fm-time'), goBtn = box.querySelector('#fm-go');
  const draw = () => { timeEl.textContent = Math.floor(left / 60) + ':' + String(left % 60).padStart(2, '0'); };
  const credit = () => {
    clearActiveTimer(); running = false;
    const goal = box.querySelector('#fm-goal').value.trim() || '五分鐘啟動';
    D.activities.unshift({ id: uid(), date: todayKey(), text: goal, type: 'win', done: true });
    save();
    timeEl.textContent = '完成！';
    goBtn.textContent = '再來五分鐘';
    left = 300;
  };
  box.querySelector('#fm-done').addEventListener('click', () => { credit(); toast('做到了就算數——已記入你的成就清單'); });
  goBtn.addEventListener('click', () => {
    if (running) { clearActiveTimer(); running = false; goBtn.textContent = '繼續'; return; }
    running = true; goBtn.textContent = '暫停';
    clearActiveTimer();
    activeTimer = setInterval(() => {
      left--; draw();
      if (left <= 0) {
        credit();
        toast('五分鐘做到了——已記入你的成就清單');
      }
    }, 1000);
  });
  box.querySelector('#fm-reset').addEventListener('click', () => { clearActiveTimer(); running = false; left = 300; draw(); goBtn.textContent = '開始'; });
}

function renderViz(host) {
  const days = [];
  const d = new Date(); d.setDate(d.getDate() - 29);
  for (let i = 0; i < 30; i++) { days.push(todayKey(d)); d.setDate(d.getDate() + 1); }
  const has = days.some(k => D.checkins[k]);
  if (!has) { host.innerHTML = '<div class="empty">簽到幾天後，這裡會長出你的心情曲線。</div>'; return; }

  if (chartMode === 'table') {
    host.innerHTML = '<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>日期</th><th>心情</th><th>睡眠</th><th>一句話</th></tr></thead><tbody>' +
      days.slice().reverse().filter(k => D.checkins[k]).map(k => {
        const c = D.checkins[k];
        return '<tr><td>' + fmtDate(k, true) + '</td><td>' + esc(c.mood) + '</td><td>' + esc(c.sleep) + '</td><td>' + esc(c.note || '') + '</td></tr>';
      }).join('') + '</tbody></table></div>';
    return;
  }

  const W = 560, H = 232, padL = 26, padR = 50, padT = 12, padB = 26;
  const x = i => padL + i * (W - padL - padR) / 29;
  const y = val => padT + (10 - val) / 10 * (H - padT - padB);

  const tKeyNow = todayKey();
  const ydDate = new Date(); ydDate.setDate(ydDate.getDate() - 1);
  const yKey = todayKey(ydDate);
  const tc = D.checkins[tKeyNow], yc = D.checkins[yKey];
  let ticker = '';
  if (tc) {
    const dchip = (cur, prevV) => {
      if (typeof prevV !== 'number') return '';
      const df = cur - prevV;
      if (df > 0) return '<span class="delta up">▲ ' + df + '</span>';
      if (df < 0) return '<span class="delta down">▼ ' + Math.abs(df) + '</span>';
      return '<span class="delta flat">—</span>';
    };
    ticker = '<div class="ticker-row"><span>今日心情 <b>' + esc(tc.mood) + '</b> ' + dchip(tc.mood, yc && yc.mood) + '</span>' +
      '<span>睡眠 <b>' + esc(tc.sleep) + '</b> ' + dchip(tc.sleep, yc && yc.sleep) + '</span>' +
      '<span class="mut" style="align-self:center">與昨日相比</span></div>';
  }

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="最近30天的心情與睡眠品質折線圖">' +
    '<defs><linearGradient id="gmood" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="var(--s-mood)" stop-opacity="0.28"/>' +
    '<stop offset="1" stop-color="var(--s-mood)" stop-opacity="0"/>' +
    '</linearGradient></defs>';
  [0, 5, 10].forEach(g => {
    svg += '<line x1="' + padL + '" y1="' + y(g) + '" x2="' + (W - padR) + '" y2="' + y(g) + '" stroke="var(--grid-line)" stroke-width="1"/>' +
      '<text x="' + (padL - 7) + '" y="' + (y(g) + 4.5) + '" text-anchor="end" font-size="14" fill="var(--ink2)" style="font-variant-numeric:tabular-nums">' + g + '</text>';
  });
  for (let i = 0; i < 30; i += 7) {
    svg += '<text x="' + x(i) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="14" fill="var(--ink2)">' + fmtDate(days[i]) + '</text>';
  }
  svg += '<line x1="' + padL + '" y1="' + y(0) + '" x2="' + (W - padR) + '" y2="' + y(0) + '" stroke="var(--axis)" stroke-width="1"/>';

  const SERIES = [{ f: 'mood', col: 'var(--s-mood)', lab: '心情', area: true }, { f: 'sleep', col: 'var(--s-sleep)', lab: '睡眠', area: false }];
  SERIES.forEach(s => {
    const segs = []; let seg = [];
    days.forEach((k, i) => {
      const c = D.checkins[k];
      if (c && typeof c[s.f] === 'number') seg.push([x(i), y(c[s.f])]);
      else if (seg.length) { segs.push(seg); seg = []; }
    });
    if (seg.length) segs.push(seg);
    if (s.area) segs.forEach(sg => {
      if (sg.length < 2) return;
      let a = 'M' + sg[0][0].toFixed(1) + ' ' + y(0).toFixed(1);
      sg.forEach(p => { a += 'L' + p[0].toFixed(1) + ' ' + p[1].toFixed(1); });
      a += 'L' + sg[sg.length - 1][0].toFixed(1) + ' ' + y(0).toFixed(1) + 'Z';
      svg += '<path d="' + a + '" fill="url(#gmood)" stroke="none"/>';
    });
    let line = '';
    segs.forEach(sg => { sg.forEach((p, j) => { line += (j ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1); }); });
    svg += '<path d="' + line + '" fill="none" stroke="' + s.col + '" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 5px color-mix(in srgb, ' + s.col + ' 55%, transparent))"/>';
    segs.forEach(sg => sg.forEach(p => {
      svg += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="2.6" fill="' + s.col + '" stroke="var(--bg)" stroke-width="1.6"/>';
    }));
    const lastSeg = segs[segs.length - 1];
    if (lastSeg) {
      const lp = lastSeg[lastSeg.length - 1];
      svg += '<circle cx="' + lp[0].toFixed(1) + '" cy="' + lp[1].toFixed(1) + '" r="7" fill="none" stroke="' + s.col + '" stroke-opacity="0.35" stroke-width="2"/>' +
        '<circle cx="' + lp[0].toFixed(1) + '" cy="' + lp[1].toFixed(1) + '" r="3.4" fill="' + s.col + '" stroke="var(--bg)" stroke-width="1.6"/>' +
        '<text x="' + (lp[0] + 10).toFixed(1) + '" y="' + (lp[1] + 4.5).toFixed(1) + '" font-size="15" fill="var(--ink2)" font-weight="600">' + s.lab + '</text>';
    }
  });
  svg += '</svg>';
  host.innerHTML = ticker + '<div class="viz-wrap">' + svg + '<div class="viz-tip" id="viz-tip"></div></div>';

  const wrap = host.querySelector('.viz-wrap'), tip = wrap.querySelector('#viz-tip'), svgEl = wrap.querySelector('svg');
  svgEl.addEventListener('pointermove', e => {
    const r = svgEl.getBoundingClientRect();
    const vx = (e.clientX - r.left) / r.width * W;
    let i = Math.round((vx - padL) / ((W - padL - padR) / 29));
    i = Math.max(0, Math.min(29, i));
    const c = D.checkins[days[i]];
    if (!c) { tip.style.opacity = 0; return; }
    tip.innerHTML = '<b>' + fmtDate(days[i], true) + '</b><br>心情 ' + esc(c.mood) + ' · 睡眠 ' + esc(c.sleep);
    const topV = Math.min(y(c.mood), y(c.sleep));
    tip.style.left = (x(i) / W * r.width) + 'px';
    tip.style.top = (topV / H * r.height) + 'px';
    tip.style.opacity = 1;
  });
  svgEl.addEventListener('pointerleave', () => { tip.style.opacity = 0; });
}
